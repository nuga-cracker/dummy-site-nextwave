<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextWave - 개선 전 프로토타입</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        .nav { display: flex; justify-content: space-between; padding: 20px 50px; background: white; border-bottom: 1px solid #eee; }
        .hero { text-align: center; padding: 100px 20px; background: #fff; }
        .btn-blue { background: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; }
        .modal { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .dashboard { display: flex; height: 100vh; }
        .sidebar { width: 200px; background: #2c3e50; color: white; padding: 20px; }
        .content { flex: 1; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [view, setView] = useState('landing');

            if (view === 'landing') {
                return (
                    <div>
                        <nav className="nav">
                            <div style={{fontWeight:'bold', fontSize:'20px'}}>NextWave</div>
                            <div>로그인</div>
                        </nav>
                        <div className="hero">
                            <h1>더 나은 업무를 위한 선택</h1>
                            <p>일정, 할 일, 문서 공유를 한 곳에서 관리하세요.</p>
                            <button className="btn-blue" onClick={() => setView('signup')}>지금 무료로 시작하기</button>
                        </div>
                    </div>
                );
            }

            if (view === 'signup') {
                return (
                    <div className="modal-overlay">
                        <div className="modal">
                            <h2>회원가입</h2>
                            <p style={{fontSize:'13px', color:'#777'}}>71.9%의 이탈률이 발생하는 복잡한 가입창</p>
                            <input className="input-field" placeholder="이름" />
                            <input className="input-field" placeholder="이메일" />
                            <input className="input-field" type="password" placeholder="비밀번호(특수문자 포함)" />
                            <select className="input-field"><option>직종 선택</option><option>마케팅</option></select>
                            <button className="btn-blue" style={{width:'100%', marginTop:'10px', background:'#28a745'}} onClick={() => setView('dashboard')}>가입 완료</button>
                            <p style={{fontSize:'12px', marginTop:'15px', cursor:'pointer'}} onClick={() => setView('landing')}>뒤로가기</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="dashboard">
                    <div className="sidebar">
                        <h3>NextWave</h3>
                        <p>🏠 홈</p><p>📅 일정</p><p>✅ 할 일</p>
                    </div>
                    <div className="content">
                        <h2>반갑습니다, 신입 마케터님!</h2>
                        <div className="card"><h4>오늘의 일정</h4><p style={{color:'#999'}}>데이터가 없습니다.</p></div>
                        <button onClick={() => setView('landing')}>로그아웃</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
